<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Green background using primary color (HSL 122 39% 42% = #3d8220) -->
  <rect width="200" height="200" fill="#3d8220" rx="12"/>
  
  <!-- Subtle gradient overlay for depth -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9429;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2d5a1a;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="url(#grad)" rx="12"/>
  
  <!-- Text "JT" in white (primary-foreground) and bold -->
  <text x="100" y="115" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="90" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="-2">JT</text>
</svg>